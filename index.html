<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vantage Flow — Turn Your Website Into a Client Machine</title>
  <meta name="description" content="We help local service businesses generate a consistent flow of bookings through high-converting websites and automation systems."/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#0F172A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#0F172A}
    ::-webkit-scrollbar-thumb{background:#2563EB;border-radius:2px}
    ::selection{background:rgba(37,99,235,0.35)}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(0.7);opacity:0.4}}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    input,textarea,select{font-family:'Plus Jakarta Sans',sans-serif!important}
    input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.25)}
    #root{min-height:100vh}

    /* Mobile nav toggle */
    .mob-menu{display:none}
    .desk-nav{display:flex;align-items:center;gap:24px;flex-wrap:wrap}

    @media(max-width:900px){
      .desk-nav{display:none}
      .mob-menu{display:flex}
      .hero-grid{grid-template-columns:1fr!important}
      .hero-dash{display:none!important}
      .prob-grid{grid-template-columns:1fr!important}
      .svc-grid{grid-template-columns:1fr!important}
      .how-grid{grid-template-columns:1fr!important}
      .results-grid{grid-template-columns:1fr!important}
      .offer-grid{grid-template-columns:1fr!important}
      .price-grid{grid-template-columns:1fr!important}
      .contact-grid{grid-template-columns:1fr!important}
      .footer-grid{grid-template-columns:1fr 1fr!important}
      .stats-strip{grid-template-columns:1fr 1fr!important}
      .svc-inc{grid-template-columns:1fr!important}
      .about-grid{grid-template-columns:1fr!important}
      .values-grid{grid-template-columns:1fr!important}
      .founder-inner{grid-template-columns:1fr!important;text-align:center}
    }
    @media(max-width:560px){
      .footer-grid{grid-template-columns:1fr!important}
      .stats-strip{grid-template-columns:1fr 1fr!important}
      .hero-stats{flex-direction:column!important;gap:20px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const ink     = "#0F172A";
const blue    = "#2563EB";
const blueL   = "#3B82F6";
const blueDim = "rgba(37,99,235,0.12)";
const blueGlow= "rgba(37,99,235,0.3)";
const wh      = "#FFFFFF";
const mu      = "#64748B";
const surf    = "#111827";
const surf2   = "#1E293B";
const bord    = "rgba(255,255,255,0.07)";
const grn     = "#10B981";
const disp    = "'Fraunces',Georgia,serif";
const bod     = "'Plus Jakarta Sans',sans-serif";

function Reveal({ children, delay }) {
  delay = delay || 0;
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        el.style.opacity = "1";
        el.style.transform = "translateY(0)";
        obs.disconnect();
      }
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ opacity:0, transform:"translateY(22px)", transition:"opacity .7s "+delay+"s cubic-bezier(.22,1,.36,1),transform .7s "+delay+"s cubic-bezier(.22,1,.36,1)" }}>
      {children}
    </div>
  );
}

function Tag({ children, col }) {
  col = col || blueL;
  const bg = col === grn ? "rgba(16,185,129,0.1)" : blueDim;
  const br = col === grn ? "1px solid rgba(16,185,129,0.25)" : "1px solid rgba(37,99,235,0.25)";
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:bg, border:br, borderRadius:100, padding:"6px 14px", marginBottom:20 }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background:col, display:"block", animation:"pulse 2s ease-in-out infinite" }}/>
      <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:col, fontFamily:bod }}>{children}</span>
    </div>
  );
}

function Btn({ children, variant, onClick, full }) {
  variant = variant || "primary";
  const [hov, setHov] = useState(false);
  const base = { display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, border:"none", borderRadius:8, padding:"14px 28px", fontSize:15, fontWeight:700, fontFamily:bod, cursor:"pointer", transition:"all 0.25s ease", width: full ? "100%" : "auto" };
  let extra = {};
  if (variant === "primary") extra = { background: hov ? "#1D4ED8" : blue, color:wh, boxShadow: hov ? "0 10px 32px "+blueGlow : "none", transform: hov ? "translateY(-2px)" : "none" };
  if (variant === "ghost")   extra = { background:"transparent", color:wh, border:"1px solid "+(hov?"rgba(255,255,255,0.25)":bord), transform: hov ? "translateY(-2px)" : "none" };
  return <button style={Object.assign({},base,extra)} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</button>;
}

const Arrow = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="2" y1="8" x2="14" y2="8"/><polyline points="9 3 14 8 9 13"/>
  </svg>
);

function Check({ col }) {
  col = col || grn;
  return (
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{flexShrink:0}}>
      <circle cx="9" cy="9" r="8.5" fill={col+"18"} stroke={col} strokeWidth="1"/>
      <path d="M5.5 9l2.5 2.5 4.5-5" stroke={col} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function SectionHeader({ tag, title, sub, center, maxWidth }) {
  maxWidth = maxWidth || 640;
  const w = { maxWidth:maxWidth, marginBottom:64 };
  if (center) { w.margin = "0 auto"; w.textAlign = "center"; w.marginBottom = 64; }
  return (
    <div style={w}>
      <Reveal><Tag>{tag}</Tag></Reveal>
      <Reveal delay={0.1}><h2 style={{ fontFamily:disp, fontSize:"clamp(30px,4vw,52px)", fontWeight:900, letterSpacing:"-0.03em", lineHeight:1.08, marginBottom:16, color:wh }}>{title}</h2></Reveal>
      {sub && <Reveal delay={0.2}><p style={{ fontSize:17, color:mu, lineHeight:1.75, fontWeight:300 }}>{sub}</p></Reveal>}
    </div>
  );
}

/* ── NAV ── */
function Nav({ page, go }) {
  const [sc, setSc] = useState(false);
  const [mob, setMob] = useState(false);
  useEffect(() => {
    const fn = () => setSc(window.scrollY > 40);
    window.addEventListener("scroll", fn);
    return () => window.removeEventListener("scroll", fn);
  }, []);
  const navLinks = [["Home","home"],["Services","services"],["About","about"],["Pricing","pricing"]];
  return (
    <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:900, padding:"0 24px", height:68, display:"flex", alignItems:"center", justifyContent:"space-between", background: sc||mob ? "rgba(15,23,42,0.96)" : "transparent", backdropFilter: sc||mob ? "blur(20px)" : "none", borderBottom: sc||mob ? "1px solid "+bord : "1px solid transparent", transition:"all 0.3s", flexWrap:"wrap" }}>
      <button onClick={()=>{ go("home"); setMob(false); }} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ width:32, height:32, background:blue, borderRadius:8, display:"grid", placeItems:"center" }}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" fill="white" fillOpacity="0.2" stroke="white" strokeWidth="1.2"/>
            <path d="M5 8L7 10L11 6" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <span style={{ fontFamily:bod, fontSize:17, fontWeight:800, color:wh }}>Vantage<span style={{ color:blue }}>Flow</span></span>
      </button>

      <div className="desk-nav">
        {navLinks.map(([l,k])=>(
          <button key={k} onClick={()=>go(k)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, fontWeight:500, fontFamily:bod, color: page===k ? wh : mu, transition:"color 0.2s" }}>{l}</button>
        ))}
        <button onClick={()=>{ go("home"); setTimeout(()=>{ const el=document.getElementById("contact"); el&&el.scrollIntoView({behavior:"smooth"}); },300); }}
          style={{ background:blue, color:wh, border:"none", borderRadius:8, padding:"10px 18px", fontSize:14, fontWeight:700, fontFamily:bod, cursor:"pointer" }}>
          Get a Free Demo
        </button>
      </div>

      <button className="mob-menu" onClick={()=>setMob(!mob)} style={{ background:"none", border:"none", cursor:"pointer", padding:8 }}>
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round">
          {mob ? <><line x1="4" y1="4" x2="18" y2="18"/><line x1="18" y1="4" x2="4" y2="18"/></> : <><line x1="2" y1="6" x2="20" y2="6"/><line x1="2" y1="11" x2="20" y2="11"/><line x1="2" y1="16" x2="20" y2="16"/></>}
        </svg>
      </button>

      {mob && (
        <div style={{ position:"absolute", top:68, left:0, right:0, background:"rgba(15,23,42,0.98)", borderBottom:"1px solid "+bord, padding:"16px 24px 24px", display:"flex", flexDirection:"column", gap:4 }}>
          {navLinks.map(([l,k])=>(
            <button key={k} onClick={()=>{ go(k); setMob(false); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:16, fontWeight:600, fontFamily:bod, color: page===k ? wh : mu, textAlign:"left", padding:"12px 0", borderBottom:"1px solid "+bord }}>
              {l}
            </button>
          ))}
          <button onClick={()=>{ go("home"); setMob(false); setTimeout(()=>{ const el=document.getElementById("contact"); el&&el.scrollIntoView({behavior:"smooth"}); },100); }}
            style={{ background:blue, color:wh, border:"none", borderRadius:8, padding:"14px", fontSize:15, fontWeight:700, fontFamily:bod, cursor:"pointer", marginTop:12 }}>
            Get a Free Demo
          </button>
        </div>
      )}
    </nav>
  );
}

/* ── HERO ── */
function Hero({ go }) {
  return (
    <section style={{ minHeight:"100vh", display:"flex", alignItems:"center", padding:"120px 0 80px", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", inset:0, backgroundImage:"linear-gradient(rgba(37,99,235,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.04) 1px,transparent 1px)", backgroundSize:"60px 60px", WebkitMaskImage:"radial-gradient(ellipse 80% 60% at 50% 50%,black,transparent)", maskImage:"radial-gradient(ellipse 80% 60% at 50% 50%,black,transparent)" }}/>
      <div style={{ position:"absolute", top:"-10%", left:"50%", transform:"translateX(-50%)", width:700, height:500, background:"radial-gradient(ellipse,rgba(37,99,235,0.15) 0%,transparent 60%)", pointerEvents:"none" }}/>
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 24px", width:"100%", position:"relative", zIndex:2 }}>
        <div className="hero-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:60, alignItems:"center" }}>
          <div>
            <Reveal>
              <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:"rgba(16,185,129,0.1)", border:"1px solid rgba(16,185,129,0.25)", borderRadius:100, padding:"6px 14px", marginBottom:24 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", background:grn, animation:"pulse 2s infinite" }}/>
                <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:grn, fontFamily:bod }}>Limited First-Round Spots Available</span>
              </div>
            </Reveal>
            <Reveal delay={0.1}>
              <h1 style={{ fontFamily:disp, fontSize:"clamp(38px,5vw,68px)", fontWeight:900, letterSpacing:"-0.03em", lineHeight:1.05, marginBottom:22 }}>
                Your Website Should Be<br/>
                <span style={{ color:blueL, fontStyle:"italic" }}>Bringing You Clients</span><br/>
                — Not Losing Them
              </h1>
            </Reveal>
            <Reveal delay={0.2}>
              <p style={{ fontSize:17, color:mu, lineHeight:1.8, marginBottom:32, fontWeight:300 }}>
                We help local service businesses get a consistent flow of bookings — through high-converting websites and automation systems built around how your clients actually behave.
              </p>
            </Reveal>
            <Reveal delay={0.3}>
              <div style={{ background:"rgba(37,99,235,0.07)", border:"1px solid rgba(37,99,235,0.2)", borderRadius:12, padding:"16px 20px", marginBottom:28 }}>
                <p style={{ fontSize:14, color:wh, lineHeight:1.7 }}>
                  <strong style={{ color:blueL }}>We're currently taking on a limited number of businesses</strong> for our first round of builds — which means you get priority attention, direct communication, and a fully customised system.
                </p>
              </div>
            </Reveal>
            <Reveal delay={0.4}>
              <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:20 }}>
                <Btn onClick={()=>{ go("home"); setTimeout(()=>{ const el=document.getElementById("contact"); el&&el.scrollIntoView({behavior:"smooth"}); },300); }}>Get a Free Demo <Arrow/></Btn>
                <Btn variant="ghost" onClick={()=>go("pricing")}>View Pricing</Btn>
              </div>
            </Reveal>
            <Reveal delay={0.5}>
              <p style={{ fontSize:13, color:mu }}>
                <span style={{ color:"#F59E0B" }}>✦</span> No upfront risk — <strong style={{ color:wh }}>only pay if you're happy</strong>
              </p>
            </Reveal>
            <Reveal delay={0.6}>
              <div className="hero-stats" style={{ display:"flex", gap:36, marginTop:44, paddingTop:36, borderTop:"1px solid "+bord }}>
                {[["1 wk","Delivery time"],["100%","Satisfaction guarantee"],["Free","Homepage demo"]].map(([v,l],i)=>(
                  <div key={i}>
                    <div style={{ fontFamily:disp, fontSize:32, fontWeight:900, letterSpacing:"-0.03em", color:wh }}>{v}</div>
                    <div style={{ fontSize:12, color:mu, marginTop:3 }}>{l}</div>
                  </div>
                ))}
              </div>
            </Reveal>
          </div>
          <Reveal delay={0.3}>
            <div className="hero-dash">
              <HeroDash/>
            </div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

function HeroDash() {
  return (
    <div style={{ position:"relative" }}>
      <div style={{ background:surf, border:"1px solid "+bord, borderRadius:20, padding:26, boxShadow:"0 40px 80px rgba(0,0,0,0.5)", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:0, left:"20%", right:"20%", height:2, background:"linear-gradient(90deg,transparent,"+blue+",transparent)" }}/>
        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:22 }}>
          {["#FF5F56","#FEBC2E","#27C840"].map(c=><div key={c} style={{ width:10, height:10, borderRadius:"50%", background:c }}/>)}
          <div style={{ marginLeft:"auto", background:"rgba(255,255,255,0.05)", border:"1px solid "+bord, borderRadius:6, padding:"4px 12px", fontSize:10, color:mu }}>System Dashboard</div>
        </div>
        {[{icon:"🗓️",label:"Bookings This Week",val:"Online booking active",col:grn},{icon:"⚡",label:"Automation Status",val:"Lead capture running",col:"#F59E0B"}].map((m,i)=>(
          <div key={i} style={{ background:surf2, border:"1px solid "+bord, borderRadius:12, padding:"14px 16px", marginBottom:10, display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:36, height:36, borderRadius:10, background:blueDim, display:"grid", placeItems:"center", fontSize:16 }}>{m.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, color:mu, marginBottom:2 }}>{m.label}</div>
              <div style={{ fontSize:14, fontWeight:600, color:wh }}>{m.val}</div>
            </div>
            <div style={{ width:8, height:8, borderRadius:"50%", background:m.col, animation:"pulse 2s infinite" }}/>
          </div>
        ))}
        <div style={{ marginTop:14 }}>
          <div style={{ fontSize:11, color:mu, marginBottom:10 }}>System Components</div>
          {[["Booking System","Integrated"],["Lead Capture","Active"],["Auto Follow-up","Running"],["Mobile Optimised","Yes"]].map(([l,v],i)=>(
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom: i<3 ? "1px solid "+bord : "none" }}>
              <span style={{ fontSize:13, color:mu }}>{l}</span>
              <span style={{ fontSize:12, fontWeight:600, color:grn, background:"rgba(16,185,129,0.1)", borderRadius:100, padding:"2px 10px" }}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      {[{t:-14,r:-20,icon:"🗓️",title:"New Booking",sub:"Client just booked online",d:"0s"},{b:16,l:-24,icon:"✅",title:"Lead Captured",sub:"Form filled 2 min ago",d:"2s"}].map((b,i)=>(
        <div key={i} style={{ position:"absolute", ...(b.t!==undefined?{top:b.t}:{bottom:b.b}), ...(b.r!==undefined?{right:b.r}:{left:b.l}), background:surf2, border:"1px solid "+bord, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 14px 32px rgba(0,0,0,0.4)", whiteSpace:"nowrap", animation:"floatY 4s "+b.d+" ease-in-out infinite" }}>
          <span style={{ fontSize:16 }}>{b.icon}</span>
          <div><div style={{ fontSize:12, fontWeight:600 }}>{b.title}</div><div style={{ fontSize:11, color:mu }}>{b.sub}</div></div>
        </div>
      ))}
    </div>
  );
}

/* ── TRUST STRIP ── */
function TrustStrip() {
  const items = ["Barbershops","Hair Salons","Restaurants","Gyms","Dental Clinics","Beauty Spas","Tattoo Studios","Physiotherapy","Med Spas","Nail Studios"];
  const doubled = [...items,...items];
  return (
    <div style={{ borderTop:"1px solid "+bord, borderBottom:"1px solid "+bord, padding:"28px 0", overflow:"hidden" }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:mu, textAlign:"center", marginBottom:18 }}>Systems built for local service businesses</div>
      <div style={{ display:"flex", overflow:"hidden", WebkitMaskImage:"linear-gradient(90deg,transparent,black 8%,black 92%,transparent)", maskImage:"linear-gradient(90deg,transparent,black 8%,black 92%,transparent)" }}>
        <div style={{ display:"flex", gap:52, animation:"marquee 24s linear infinite", flexShrink:0 }}>
          {doubled.map((t,i)=><span key={i} style={{ fontSize:13, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase", color:"rgba(255,255,255,0.14)", whiteSpace:"nowrap" }}>{t}</span>)}
        </div>
      </div>
    </div>
  );
}

/* ── PROBLEM ── */
function Problem() {
  const items = [
    {icon:"🐌",n:"01",title:"Slow, Outdated Websites",body:"If your site takes more than 3 seconds to load, over half your visitors leave before reading a word — before they even have the chance to book."},
    {icon:"📅",n:"02",title:"No Clear Booking Journey",body:"Without a seamless booking flow, interested visitors move on to whoever makes it easiest. Every hour without a booking system is missed revenue."},
    {icon:"🚪",n:"03",title:"Visitors Leave Without Acting",body:"Without lead capture, visitors who are interested but not quite ready simply vanish — there's no system to follow up, no second chance."},
  ];
  return (
    <section style={{ padding:"100px 0", background:surf }}>
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 24px" }}>
        <SectionHeader tag="The Problem" title="Most Local Businesses Are Losing Customers Every Day" sub="Your website might be live — but is it working? Here's what's quietly costing most local businesses revenue right now."/>
        <div className="prob-grid" style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:2, border:"2px solid "+bord, borderRadius:20, overflow:"hidden" }}>
          {items.map((p,i)=>(
            <Reveal delay={i*0.1} key={i}>
              <ProbCard {...p}/>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
}

function ProbCard({ icon, n, title, body }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background: hov ? "rgba(15,23,42,0.6)" : ink, padding:"40px 32px", transition:"background 0.3s", position:"relative", overflow:"hidden" }}>
      <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:"linear-gradient(90deg,transparent,"+blue+",transparent)", opacity:hov?1:0, transition:"opacity 0.3s" }}/>
      <div style={{ fontFamily:disp, fontSize:56, fontWeight:900, color:"rgba(255,255,255,0.03)", lineHeight:1, marginBottom:12 }}>{n}</div>
      <div style={{ fontSize:30, marginBottom:14 }}>{icon}</div>
      <h3 style={{ fontSize:18, fontWeight:700, marginBottom:10 }}>{title}</h3>
      <p style={{ fontSize:14, color:mu, lineHeight:1.75, fontWeight:300 }}>{body}</p>
    </div>
  );
}

/* ── SOLUTION ── */
function Solution({ go }) {
  const svcs = [

                <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" fill="white" fillOpacity="0.2" stroke="white" strokeWidth="1.2"/><path d="M5 8L7 10L11 6" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <span style={{ fontFamily:bod, fontSize:16, fontWeight:800, color:wh }}>Vantage<span style={{ color:blue }}>Flow</span></span>
            </button>
            <p style={{ fontSize:13, color:mu, lineHeight:1.75, maxWidth:220, fontWeight:300 }}>Client acquisition systems for local service businesses.</p>
            <a href="mailto:vantageflowa@gmail.com" style={{ fontSize:13, color:blueL, textDecoration:"none", display:"block", marginTop:10 }}>vantageflowa@gmail.com</a>
          </div>
          {[["Company",[["About","about"],["Services","services"],["Pricing","pricing"]]],["Services",[["Web Design","services"],["Booking Systems","services"],["Automation","services"]]],["Start",[["Free Demo",null],["Book a Call",null],["Contact",null]]]].map(([label,links],i)=>(
            <div key={i}>
              <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:mu, marginBottom:14 }}>{label}</div>
              <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                {links.map(([t,k],j)=>(
                  <button key={j} onClick={()=>{ if(k){ go(k); window.scrollTo(0,0); } else { go("home"); setTimeout(()=>{ const el=document.getElementById("contact"); el&&el.scrollIntoView({behavior:"smooth"}); },300); } }}
                    style={{ background:"none", border:"none", cursor:"pointer", color:mu, fontSize:13, textAlign:"left", padding:0, fontFamily:bod, transition:"color 0.2s" }}
                    onMouseOver={e=>e.target.style.color=wh} onMouseOut={e=>e.target.style.color=mu}>{t}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <p style={{ fontSize:12, color:"rgba(255,255,255,0.22)" }}>2025 VantageFlow. All rights reserved.</p>
          <p style={{ fontSize:12, color:"rgba(255,255,255,0.22)" }}>Founded by Jaskaran Singh Daudher</p>
        </div>

  );
}

/* ── HOME ── */
function Home({ go }) {
  return (
    <div style={{ animation:"fadeIn 0.4s ease" }}>
      <Hero go={go}/>
      <TrustStrip/>
      <Problem/>
      <Solution go={go}/>
      <HowItWorks/>
      <WhatYouGet/>
      <Offer/>
      <Pricing/>
      <WhyUs/>
      <Founder/>
      <FinalCTA go={go}/>
      <Contact/>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [page, setPage] = useState("home");
  const go = useCallback(p => { setPage(p); window.scrollTo({ top:0, behavior:"smooth" }); }, []);
  const pages = { home:<Home go={go}/>, services:<ServicesPage/>, about:<AboutPage/>, pricing:<PricingPage/> };
  return (
    <div>
      <Nav page={page} go={go}/>
      <main style={{ minHeight:"100vh" }}>{pages[page]||pages.home}</main>
      <Footer go={go}/>
      <Chat/>
      <Popup/>
    </div>
  );
}

const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(App));
</script>
