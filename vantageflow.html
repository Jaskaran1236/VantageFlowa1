<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantage Flow — Turn Your Website Into a Client Machine</title>
  <meta name="description" content="We help local service businesses generate a consistent flow of bookings through high-converting websites and automation systems." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #0F172A; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 2px; }
    ::selection { background: rgba(37,99,235,0.35); }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(32px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn  { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
    @keyframes pulse    { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(0.7); opacity:0.4; } }
    @keyframes float    { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); } }
    @keyframes shimmer  { from { background-position:200% center; } to { background-position:-200% center; } }
    @keyframes spin     { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
    @keyframes barGrow  { from { transform:scaleX(0); } to { transform:scaleX(1); } }
    @keyframes marquee  { from { transform:translateX(0); } to { transform:translateX(-50%); } }
    @keyframes countUp  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    input, textarea, select { font-family: 'Plus Jakarta Sans', sans-serif !important; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
    .chat-input::placeholder { color: rgba(255,255,255,0.3); }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── TOKENS ── */
    const C = {
      ink:"#0F172A", blue:"#2563EB", blueL:"#3B82F6",
      blueDim:"rgba(37,99,235,0.12)", blueGlow:"rgba(37,99,235,0.3)",
      white:"#FFFFFF", muted:"#64748B", surface:"#111827",
      surf2:"#1E293B", border:"rgba(255,255,255,0.07)", green:"#10B981",
    };
    const F = { display:"'Fraunces', Georgia, serif", body:"'Plus Jakarta Sans', sans-serif" };

    /* ── REVEAL ── */
    function Reveal({ children, delay=0, style={} }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.style.opacity="1"; el.style.transform="translateY(0)"; obs.disconnect(); }
        }, { threshold:0.1 });
        obs.observe(el); return () => obs.disconnect();
      }, []);
      return (
        <div ref={ref} style={{ opacity:0, transform:"translateY(28px)", transition:`opacity .75s ${delay}s cubic-bezier(.22,1,.36,1), transform .75s ${delay}s cubic-bezier(.22,1,.36,1)`, ...style }}>
          {children}
        </div>
      );
    }

    /* ── SHARED ── */
    function Tag({ children }) {
      return (
        <div style={{ display:"inline-flex", alignItems:"center", gap:8, background:C.blueDim, border:`1px solid rgba(37,99,235,0.25)`, borderRadius:100, padding:"6px 14px", marginBottom:20 }}>
          <span style={{ width:6, height:6, borderRadius:"50%", background:C.blueL, display:"block", animation:"pulse 2s ease-in-out infinite" }}/>
          <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:C.blueL, fontFamily:F.body }}>{children}</span>
        </div>
      );
    }

    function Btn({ children, variant="primary", onClick, style:extra={} }) {
      const [hov, setHov] = useState(false);
      const base = { display:"inline-flex", alignItems:"center", gap:8, border:"none", borderRadius:8, padding:"14px 28px", fontSize:15, fontWeight:700, fontFamily:F.body, cursor:"pointer", transition:"all 0.25s ease", ...extra };
      const styles = {
        primary:{ background:hov?"#1D4ED8":C.blue, color:C.white, boxShadow:hov?`0 10px 32px ${C.blueGlow}`:"none", transform:hov?"translateY(-2px)":"none" },
        ghost:{ background:"transparent", color:C.white, border:`1px solid ${hov?"rgba(255,255,255,0.25)":C.border}`, transform:hov?"translateY(-2px)":"none" },
        outline:{ background:"transparent", color:C.blue, border:`1px solid ${C.blue}`, transform:hov?"translateY(-2px)":"none", boxShadow:hov?`0 8px 24px ${C.blueGlow}`:"none" },
      };
      return <button style={{...base,...styles[variant]}} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>{children}</button>;
    }

    function SectionHeader({ tag, title, sub, center=false, maxWidth=640 }) {
      return (
        <div style={{ maxWidth, ...(center?{margin:"0 auto",textAlign:"center"}:{}), marginBottom:64 }}>
          <Reveal><Tag>{tag}</Tag></Reveal>
          <Reveal delay={0.1}><h2 style={{ fontFamily:F.display, fontSize:"clamp(34px,4vw,54px)", fontWeight:900, letterSpacing:"-0.03em", lineHeight:1.08, marginBottom:16, color:C.white }}>{title}</h2></Reveal>
          {sub && <Reveal delay={0.2}><p style={{ fontSize:18, color:C.muted, lineHeight:1.75, fontWeight:300 }}>{sub}</p></Reveal>}
        </div>
      );
    }

    function Card({ children, style:extra={}, hover=true }) {
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={()=>hover&&setHov(true)} onMouseLeave={()=>hover&&setHov(false)}
          style={{ background:C.surface, border:`1px solid ${hov?"rgba(37,99,235,0.35)":C.border}`, borderRadius:20, transition:"all 0.3s ease", transform:hov?"translateY(-6px)":"none", boxShadow:hov?`0 24px 60px rgba(0,0,0,0.4)`:\"none\", ...extra }}>
          {children}
        </div>
      );
    }

    const ArrowIcon = () => (
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="2" y1="8" x2="14" y2="8"/><polyline points="9 3 14 8 9 13"/>
      </svg>
    );

    const CheckIcon = ({ color=C.green }) => (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style={{flexShrink:0}}>
        <circle cx="9" cy="9" r="8.5" fill={`${color}18`} stroke={color} strokeWidth="1"/>
        <path d="M5.5 9l2.5 2.5 4.5-5" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    /* ── NAV ── */
    function Nav({ page, setPage }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 40);
        window.addEventListener("scroll", fn); return () => window.removeEventListener("scroll", fn);
      }, []);
      const links = [{ label:"Home",key:"home" },{ label:"Services",key:"services" },{ label:"About",key:"about" },{ label:"Pricing",key:"pricing" }];
      return (
        <nav style={{ position:"fixed",top:0,left:0,right:0,zIndex:900,padding:"0 32px",height:70,display:"flex",alignItems:"center",justifyContent:"space-between",background:scrolled?"rgba(15,23,42,0.88)":"transparent",backdropFilter:scrolled?"blur(20px)":"none",borderBottom:scrolled?`1px solid ${C.border}`:"1px solid transparent",transition:"all 0.35s ease" }}>
          <button onClick={()=>{ setPage("home"); window.scrollTo(0,0); }} style={{ background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10 }}>
            <div style={{ width:34,height:34,background:C.blue,borderRadius:8,display:"grid",placeItems:"center" }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" fill="white" fillOpacity="0.2" stroke="white" strokeWidth="1.2"/>
                <path d="M5 8L7 10L11 6" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span style={{ fontFamily:F.body,fontSize:18,fontWeight:800,color:C.white,letterSpacing:"-0.01em" }}>Vantage<span style={{ color:C.blue }}>Flow</span></span>
          </button>
          <div style={{ display:"flex",alignItems:"center",gap:28,flexWrap:"wrap" }}>
            {links.map(l => (
              <button key={l.key} onClick={()=>{ setPage(l.key); window.scrollTo(0,0); }} style={{ background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:500,fontFamily:F.body,color:page===l.key?C.white:C.muted,transition:"color 0.2s" }}>{l.label}</button>
            ))}
            <button onClick={()=>{ setPage("home"); setTimeout(()=>document.getElementById("contact")?.scrollIntoView({behavior:"smooth"}),100); }}
              style={{ background:C.blue,color:C.white,border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:700,fontFamily:F.body,cursor:"pointer",transition:"all 0.2s" }}
              onMouseOver={e=>{ e.target.style.transform="translateY(-2px)"; e.target.style.boxShadow=`0 8px 28px ${C.blueGlow}`; }}
              onMouseOut={e=>{ e.target.style.transform="none"; e.target.style.boxShadow="none"; }}
            >Get a Free Demo</button>
          </div>
        </nav>
      );
    }

    /* ── HERO ── */
    function HeroSection({ setPage }) {
      const [count, setCount] = useState({ a:0,b:0,c:0 });
      useEffect(() => {
        const t = setTimeout(() => {
          const animate = (key,end) => {
            const dur=1800, start=Date.now();
            const tick = () => {
              const p = Math.min((Date.now()-start)/dur,1);
              const ease = 1-Math.pow(1-p,3);
              setCount(prev=>({...prev,[key]:Math.floor(ease*end)}));
              if(p<1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          };
          animate("a",3); animate("b",48); animate("c",100);
        }, 600);
        return ()=>clearTimeout(t);
      }, []);

      return (
        <section style={{ minHeight:"100vh",display:"flex",alignItems:"center",padding:"130px 0 90px",position:"relative",overflow:"hidden" }}>
          <div style={{ position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px)",backgroundSize:"60px 60px",maskImage:"radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent)",WebkitMaskImage:"radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent)" }} />
          <div style={{ position:"absolute",top:"-10%",left:"50%",transform:"translateX(-50%)",width:900,height:600,background:"radial-gradient(ellipse, rgba(37,99,235,0.15) 0%, transparent 60%)",pointerEvents:"none" }} />
          <div style={{ maxWidth:1200,margin:"0 auto",padding:"0 32px",width:"100%",position:"relative",zIndex:2 }}>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:60,alignItems:"center" }}>
              <div>
                <Reveal>
                  <div style={{ display:"inline-flex",alignItems:"center",gap:8,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:100,padding:"6px 14px",marginBottom:28 }}>
                    <span style={{ width:6,height:6,borderRadius:"50%",background:C.green,animation:"pulse 2s infinite" }}/>
                    <span style={{ fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.green,fontFamily:F.body }}>Now Accepting New Clients</span>
                  </div>
                </Reveal>
                <Reveal delay={0.1}>
                  <h1 style={{ fontFamily:F.display,fontSize:"clamp(42px,5vw,72px)",fontWeight:900,letterSpacing:"-0.03em",lineHeight:1.04,marginBottom:24 }}>
                    Your Website Should Be<br/>
                    <span style={{ color:C.blueL,fontStyle:"italic" }}>Bringing You Clients</span>
                    <br/>— Not Losing Them
                  </h1>
                </Reveal>
                <Reveal delay={0.2}>
                  <p style={{ fontSize:19,color:C.muted,lineHeight:1.75,marginBottom:36,maxWidth:520,fontWeight:300 }}>
                    We help local service businesses generate a consistent flow of bookings through high-converting websites and automation systems.
                  </p>
                </Reveal>
                <Reveal delay={0.3}>
                  <div style={{ display:"flex",gap:14,flexWrap:"wrap",marginBottom:28 }}>
                    <Btn onClick={()=>document.getElementById("contact")?.scrollIntoView({behavior:"smooth"})}>Get a Free Demo <ArrowIcon/></Btn>
                    <Btn variant="ghost" onClick={()=>setPage("pricing")}>View Pricing</Btn>
                  </div>
                </Reveal>
                <Reveal delay={0.4}>
                  <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L9.8 5.7H14.2L10.7 8.3L12 12.5L8 9.9L4 12.5L5.3 8.3L1.8 5.7H6.2L8 1.5Z" fill="#F59E0B"/></svg>
                    <span style={{ fontSize:13,color:C.muted }}>No upfront risk — <span style={{ color:C.white,fontWeight:600 }}>only pay if you're happy</span></span>
                  </div>
                </Reveal>
                <Reveal delay={0.5}>
                  <div style={{ display:"flex",gap:40,marginTop:48,paddingTop:40,borderTop:`1px solid ${C.border}` }}>
                    {[{val:`${count.a}×`,label:"Avg. booking increase"},{val:`${count.b}hr`,label:"Delivery time"},{val:`${count.c}%`,label:"Satisfaction rate"}].map((s,i) => (
                      <div key={i}>
                        <div style={{ fontFamily:F.display,fontSize:34,fontWeight:900,letterSpacing:"-0.04em" }}>{s.val}</div>
                        <div style={{ fontSize:13,color:C.muted,marginTop:3 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                </Reveal>
              </div>
              <Reveal delay={0.3}><HeroDashboard/></Reveal>
            </div>
          </div>
        </section>
      );
    }

    function HeroDashboard() {
      return (
        <div style={{ position:"relative" }}>
          <div style={{ background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:28,boxShadow:"0 40px 80px rgba(0,0,0,0.5)",position:"relative",overflow:"hidden" }}>
            <div style={{ position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"linear-gradient(90deg, transparent, #2563EB, transparent)" }}/>
            <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:24 }}>
              {["#FF5F56","#FEBC2E","#27C840"].map(c=><div key={c} style={{ width:10,height:10,borderRadius:"50%",background:c }}/>)}
              <div style={{ marginLeft:"auto",background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 12px",fontSize:11,color:C.muted }}>vantageflow.co/dashboard</div>
            </div>
            {[{icon:"📈",label:"Monthly Bookings",val:"312",change:"+148%",color:"#10B981"},{icon:"⚡",label:"Automated Leads",val:"94",change:"+73%",color:"#F59E0B"}].map((m,i) => (
              <div key={i} style={{ background:C.surf2,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:14 }}>
                <div style={{ width:38,height:38,borderRadius:10,background:C.blueDim,display:"grid",placeItems:"center",fontSize:16 }}>{m.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11,color:C.muted,marginBottom:3 }}>{m.label}</div>
                  <div style={{ fontFamily:F.display,fontSize:22,fontWeight:700 }}>{m.val}</div>
                </div>
                <div style={{ fontSize:11,background:`${m.color}15`,color:m.color,borderRadius:100,padding:"3px 10px",fontWeight:600 }}>{m.change}</div>
              </div>
            ))}
            <div style={{ marginTop:16 }}>
              {[{label:"Conversion Rate",pct:74},{label:"Lead Capture",pct:68},{label:"Client Retention",pct:91}].map((b,i) => (
                <div key={i} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:5 }}>
                    <span>{b.label}</span><span style={{ color:C.white }}>{b.pct}%</span>
                  </div>
                  <div style={{ height:5,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden" }}>
                    <div style={{ height:"100%",width:`${b.pct}%`,background:`linear-gradient(90deg, ${C.blue}, ${C.blueL})`,borderRadius:3,transformOrigin:"left",animation:`barGrow 1.2s ${i*0.2}s ease forwards`,transform:"scaleX(0)" }}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
          {[{top:-16,right:-24,icon:"🗓️",title:"New Booking",sub:"Priya S. · 2 min ago",delay:"0s"},{bottom:20,left:-28,icon:"🤖",title:"Chatbot Active",sub:"8 leads captured today",delay:"2s"}].map((b,i) => (
            <div key={i} style={{ position:"absolute",...(b.top!==undefined?{top:b.top}:{bottom:b.bottom}),...(b.right!==undefined?{right:b.right}:{left:b.left}),background:C.surf2,border:`1px solid ${C.border}`,borderRadius:12,padding:"11px 15px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 16px 36px rgba(0,0,0,0.4)",whiteSpace:"nowrap",animation:`float 4s ${b.delay} ease-in-out infinite` }}>
              <span style={{ fontSize:18 }}>{b.icon}</span>
              <div><div style={{ fontSize:12,fontWeight:600 }}>{b.title}</div><div style={{ fontSize:11,color:C.muted }}>{b.sub}</div></div>
            </div>
          ))}
        </div>
      );
    }

    /* ── TRUST STRIP ── */
    function TrustStrip() {
      const items = ["Barbershops","Hair Salons","Restaurants","Gyms","Dental Clinics","Beauty Spas","Tattoo Studios","Physiotherapy","Med Spas","Nail Studios"];
      const doubled = [...items,...items];
      return (
        <div style={{ borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,padding:"32px 0",overflow:"hidden" }}>
          <div style={{ fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,textAlign:"center",marginBottom:20 }}>Trusted by local businesses across industries</div>
          <div style={{ display:"flex",overflow:"hidden",maskImage:"linear-gradient(90deg, transparent, black 8%, black 92%, transparent)",WebkitMaskImage:"linear-gradient(90deg, transparent, black 8%, black 92%, transparent)" }}>
            <div style={{ display:"flex",gap:56,animation:"marquee 24s linear infinite",flexShrink:0 }}>
              {doubled.map((t,i) => <span key={i} style={{ fontSize:14,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:"rgba(255,255,255,0.15)",whiteSpace:"nowrap" }}>{t}</span>)}
            </div>
          </div>
        </div>
      );
    }

    /* ── PROBLEM ── */
    function ProblemSection() {
      const problems = [
        { icon:"🐌",num:"01",title:"Slow, Outdated Websites",body:"If your site takes more than 3 seconds to load, 53% of visitors leave. That's more than half your potential clients — gone before they read a word." },
        { icon:"📅",num:"02",title:"No Clear Booking Journey",body:"Visitors who can't book instantly move on. No booking system means missed revenue every single hour your business is closed." },
        { icon:"🚪",num:"03",title:"Visitors Leave Without Acting",body:"Without lead capture and follow-up automation, interested visitors simply disappear. You paid to get them there — and got nothing back." },
      ];
      return (
        <section style={{ padding:"110px 0",background:C.surface }}>
          <div style={{ maxWidth:1200,margin:"0 auto",padding:"0 32px" }}>
            <SectionHeader tag="The Problem" title="Most Local Businesses Are Losing Customers Every Day" sub="Your website might be live — but is it working? For most local businesses, the answer is no. Here's what's quietly costing you revenue." />
            <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:2,border:`2px solid ${C.border}`,borderRadius:20,overflow:"hidden" }}>
              {problems.map((p,i) => <Reveal delay={i*0.1} key={i}><ProblemCard {...p}/></Reveal>)}
            </div>
          </div>
        </section>
      );
    }

    function ProblemCard({ icon,num,title,body }) {
      const [hov,setHov] = useState(false);
      return (
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{ background:hov?"rgba(15,23,42,0.5)":C.ink,padding:"44px 36px",transition:"background 0.3s",position:"relative",overflow:"hidden" }}>
          <div style={{ position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg, transparent, ${C.blue}, transparent)`,opacity:hov?1:0,transition:"opacity 0.3s" }}/>
          <div style={{ fontFamily:F.display,fontSize:60,fontWeight:900,color:"rgba(255,255,255,0.03)",lineHeight:1,marginBottom:14 }}>{num}</div>
          <div style={{ fontSize:32,marginBottom:16 }}>{icon}</div>
          <h3 style={{ fontSize:19,fontWeight:700,marginBottom:12 }}>{title}</h3>
          <p style={{ fontSize:15,color:C.muted,lineHeight:1.75,fontWeight:300 }}>{body}</p>
        </div>
      );
    }

    /* ── SOLUTION ── */
    function SolutionSection({ setPage }) {
      const services = [
        { num:"01",icon:"🖥️",title:"High-Converting Website Design",body:"Every page is engineered to guide visitors toward booking — fast, mobile-first, and built around how your local audience thinks.",features:["Mobile-first, sub-1s load speed","Conversion-focused layout & copy","SEO-ready architecture","Custom branding"] },
        { num:"02",icon:"📆",title:"Booking System Integration",body:"Let clients book 24/7 without a single phone call. We install scheduling systems that sync with your calendar seamlessly.",features:["24/7 online booking","Automated confirmations & reminders","Calendar sync","No-show reduction"] },
        { num:"03",icon:"🤖",title:"Automation & Lead Capture",body:"Capture every lead, follow up automatically, and re-engage cold prospects — all running behind the scenes.",features:["AI chatbot & instant replies","Email & SMS follow-up flows","Lead capture forms & popups","Re-engagement sequences"] },
      ];
      return (
        <section style={{ padding:"110px 0" }}>
          <div style={{ maxWidth:1200,margin:"0 auto",padding:"0 32px" }}>
            <SectionHeader tag="The Solution" title="We Build Systems That Turn Visitors Into Paying Clients" sub="This isn't just a website — it's a system designed to generate revenue. Everything we build has one job: get you more bookings." />
            <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:24 }}>
              {services.map((s,i) => (

                  </div>

                {typing && <div style={{ display:"flex" }}><div style={{ background:C.surf2,borderRadius:"12px 12px 12px 4px",padding:"12px 16px",display:"flex",gap:5 }}>{[0,1,2].map(i=><span key={i} style={{ width:6,height:6,borderRadius:"50%",background:C.muted,animation:`pulse 1.2s ${i*0.2}s ease-in-out infinite`,display:"block" }}/>)}</div></div>}
                <div ref={endRef}/>
              </div>
              <div style={{ padding:"12px 16px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10 }}>
                <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask anything..."
                  style={{ flex:1,background:C.surf2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.white,outline:"none",fontFamily:F.body }}/>

                  <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                    {col.links.map((l,j) => (
                      <button key={j} onClick={()=>{ if(l.k){ setPage(l.k); window.scrollTo(0,0); } else document.getElementById("contact")?.scrollIntoView({behavior:"smooth"}); }}
                        style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,textAlign:"left",padding:0,fontFamily:F.body }}
                        onMouseOver={e=>e.target.style.color=C.white} onMouseOut={e=>e.target.style.color=C.muted}
                      >{l.t}</button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12 }}>
              <p style={{ fontSize:12,color:"rgba(255,255,255,0.25)" }}>© 2025 VantageFlow. All rights reserved.</p>
              <p style={{ fontSize:12,color:"rgba(255,255,255,0.25)" }}>Built for local businesses that deserve better.</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ── HOME PAGE ── */
    function HomePage({ setPage }) {
      return (
        <div style={{ animation:"fadeIn 0.4s ease" }}>
          <HeroSection setPage={setPage}/>
          <TrustStrip/>
          <ProblemSection/>
          <SolutionSection setPage={setPage}/>
          <HowItWorks/>
          <ResultsSection/>
          <OfferSection/>
          <PricingSection/>
          <TestimonialsSection/>
          <FinalCTA setPage={setPage}/>
          <ContactSection/>
        </div>
      );
    }

    /* ── APP ── */
    function App() {
      const [page,setPage] = useState("home");
      const navigate = useCallback((p)=>{ setPage(p); window.scrollTo({top:0,behavior:"smooth"}); },[]);
      const pages = { home:<HomePage setPage={navigate}/>, services:<ServicesPage/>, about:<AboutPage/>, pricing:<PricingPageFull/> };
      return (
        <>
          <Nav page={page} setPage={navigate}/>
          <main style={{ minHeight:"100vh" }}>{pages[page]||pages.home}</main>
          <Footer setPage={navigate}/>
          <ChatWidget/>
          <LeadPopup/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
